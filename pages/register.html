<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - RecoMédia</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-user-plus"></i> Créer un compte</h1>
    </header>

    <main>
        <div class="auth-container">
            <form>
                <div style="margin-bottom: 15px;">
                    <label>Pseudo :</label>
                    <input type="text" name="username" placeholder="Ex: Shelly-Linda">
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Email :</label>
                    <input type="email" name="email" placeholder="votre@email.com">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label>Mot de passe :</label>
                    <input type="password" name="password" placeholder="********">
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Confirmer le mot de passe :</label>
                    <input type="password" name="confirm_password" placeholder="********">
                </div>
                
                <button type="submit">S'inscrire</button>
            </form>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #444;">
            
            <p style="text-align: center;">
                <span style="color: #bbb;">Déjà membre ?</span> 
                <a href="login.html" class="auth-link-white"> Se connecter</a>
            </p>
            <p style="text-align: center;">
                <a href="../index.html" class="auth-link-white">
                   <i class="fas fa-arrow-left"></i> Retour à l'accueil
                </a>
            </p>
        </div>
    </main>

    <footer style="text-align: center; margin-top: 20px;">
        2026 - RecoMédia
    </footer>
    <script src="../js/script.js"></script>
</body>
</html>
