<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - RecoMédia</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-lock"></i> Connexion</h1>
    </header>

    <main>
        <div class="auth-container">
            <h2>Connexion</h2>
            <form>
                <label>Email :</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com">
                
                <label>Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="********">
                
                <button type="button" onclick ="verifierConnexion()">Se connecter</button>
            </form>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <p style="text-align: center; margin-top: 20px;">
                <span style="color: #bbb;">Pas encore de compte ?</span> 
                    <a href="register.html" class="auth-link-white">S'inscrire ici</a>
            </p>
            <p style="text-align: center;">
                <a href="../index.html" style="color: var(--secondary); text-decoration: none;">
                   <i class="fas fa-arrow-left"></i> Retour à l'accueil
                </a>
            </p>
        </div>
    </main>

    <footer style="text-align: center; margin-top: 20px;">
        2026 - RecoMédia
    </footer>
    <script src="../js/script.js"></script>
</body>
</html>
